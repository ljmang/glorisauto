# Cloudflare Pages 配置（静态站点）
# 文档: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
name = "glorisauto-www"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 静态站点：构建产物目录（与 astro build 输出一致）
pages_build_output_dir = "dist"

# Public env used during Astro static builds and Pages runtime.
[vars]
PUBLIC_STRAPI_URL = "https://admin.glorisauto.com"
STRAPI_BUILD_URL = "http://8.138.154.183:1337"
STRAPI_FETCH_RETRIES = "3"

[env.preview.vars]
PUBLIC_STRAPI_URL = "https://admin.glorisauto.com"
STRAPI_BUILD_URL = "http://8.138.154.183:1337"
STRAPI_FETCH_RETRIES = "3"

[env.production.vars]
PUBLIC_STRAPI_URL = "https://admin.glorisauto.com"
STRAPI_BUILD_URL = "http://8.138.154.183:1337"
STRAPI_FETCH_RETRIES = "3"
